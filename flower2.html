<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Gift for Sadia 💐</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/fontsource/fonts/great-vibes@latest/latin-400-normal.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/fontsource/fonts/dancing-script@latest/latin-700-normal.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/fontsource/fonts/playfair-display@latest/latin-400-normal.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: 'Playfair Display', serif;
    background: linear-gradient(135deg, #ffafbd 0%, #ffc3a0 50%, #ffafbd 100%);
    background-size: 400% 400%;
    animation: gradientShift 15s ease infinite;
  }
  
  @keyframes gradientShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
  
  /* Falling petals */
  .petal {
    position: fixed;
    top: -50px;
    width: 20px;
    height: 20px;
    pointer-events: none;
    z-index: 1;
    opacity: 0.8;
  }
  
  @keyframes fall {
    0% { transform: translateY(-50px) rotate(0deg) translateX(0); opacity: 0; }
    10% { opacity: 0.8; }
    100% { transform: translateY(110vh) rotate(720deg) translateX(100px); opacity: 0; }
  }
  
  /* Hearts floating */
  .heart {
    position: fixed;
    color: #ff4778;
    pointer-events: none;
    z-index: 1;
    animation: floatUp linear forwards;
    text-shadow: 0 0 10px rgba(255,71,120,0.5);
  }
  
  @keyframes floatUp {
    0% { transform: translateY(0) scale(0); opacity: 0; }
    20% { transform: translateY(-50px) scale(1); opacity: 1; }
    100% { transform: translateY(-100vh) scale(1.5); opacity: 0; }
  }
  
  /* Sparkles */
  .sparkle {
    position: fixed;
    width: 4px;
    height: 4px;
    background: white;
    border-radius: 50%;
    pointer-events: none;
    z-index: 2;
    box-shadow: 0 0 10px white, 0 0 20px #fff;
    animation: sparkle 2s ease-in-out infinite;
  }
  
  @keyframes sparkle {
    0%, 100% { opacity: 0; transform: scale(0); }
    50% { opacity: 1; transform: scale(1); }
  }
  
  /* Main container */
  .container {
    position: relative;
    width: 100%;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  
  /* Gift Box Scene */
  .gift-scene {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    transition: opacity 1s ease, transform 1s ease;
  }
  
  .gift-scene.hidden {
    opacity: 0;
    transform: scale(1.5);
    pointer-events: none;
  }
  
  .gift-box {
    width: 220px;
    height: 220px;
    position: relative;
    cursor: pointer;
    animation: boxBounce 2s ease-in-out infinite;
    transition: transform 0.3s;
  }
  
  .gift-box:hover {
    transform: scale(1.05);
  }
  
  @keyframes boxBounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
  }
  
  .box-body {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 160px;
    background: linear-gradient(135deg, #ff6b9d, #c44569);
    border-radius: 8px;
    box-shadow: 0 20px 40px rgba(196,69,105,0.4);
    overflow: hidden;
  }
  
  .box-body::before {
    content: '';
    position: absolute;
    left: 50%;
    top: 0;
    transform: translateX(-50%);
    width: 30px;
    height: 100%;
    background: linear-gradient(180deg, #ffd700, #ffb700);
    box-shadow: 0 0 20px rgba(255,215,0,0.5);
  }
  
  .box-lid {
    position: absolute;
    top: 0;
    left: -5px;
    width: calc(100% + 10px);
    height: 60px;
    background: linear-gradient(135deg, #ff6b9d, #c44569);
    border-radius: 8px;
    box-shadow: 0 10px 20px rgba(196,69,105,0.3);
    transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    transform-origin: bottom center;
  }
  
  .box-lid::before {
    content: '';
    position: absolute;
    left: 50%;
    top: 0;
    transform: translateX(-50%);
    width: 30px;
    height: 100%;
    background: linear-gradient(180deg, #ffd700, #ffb700);
  }
  
  .box-bow {
    position: absolute;
    top: -30px;
    left: 50%;
    transform: translateX(-50%);
    width: 100px;
    height: 50px;
    z-index: 2;
  }
  
  .bow-loop {
    position: absolute;
    width: 50px;
    height: 40px;
    background: radial-gradient(circle at 30% 30%, #ffd700, #d4a017);
    border-radius: 50%;
    top: 5px;
  }
  
  .bow-loop.left { left: 0; }
  .bow-loop.right { right: 0; }
  
  .bow-knot {
    position: absolute;
    left: 50%;
    top: 15px;
    transform: translateX(-50%);
    width: 25px;
    height: 25px;
    background: radial-gradient(circle at 30% 30%, #ffd700, #d4a017);
    border-radius: 50%;
    box-shadow: 0 0 15px rgba(255,215,0,0.7);
  }
  
  .gift-text {
    margin-top: 40px;
    font-family: 'Great Vibes', cursive;
    font-size: 2.5rem;
    color: white;
    text-shadow: 0 4px 20px rgba(196,69,105,0.6), 0 2px 4px rgba(0,0,0,0.2);
    animation: fadeInUp 2s ease;
  }
  
  .tap-hint {
    margin-top: 20px;
    color: white;
    font-size: 0.9rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0.9;
    animation: pulse 1.5s ease-in-out infinite;
  }
  
  @keyframes pulse {
    0%, 100% { opacity: 0.5; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.05); }
  }
  
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  /* Bouquet Reveal */
  .bouquet-scene {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1.5s ease;
  }
  
  .bouquet-scene.visible {
    opacity: 1;
    pointer-events: auto;
  }
  
  .for-text {
    font-family: 'Dancing Script', cursive;
    font-size: 2.5rem;
    color: white;
    text-shadow: 0 4px 20px rgba(196,69,105,0.6);
    margin-bottom: 10px;
    opacity: 0;
    transform: translateY(-30px);
    transition: all 1s ease 0.5s;
  }
  
  .name-text {
    font-family: 'Great Vibes', cursive;
    font-size: 5rem;
    color: white;
    text-shadow: 0 4px 30px rgba(196,69,105,0.8), 0 2px 4px rgba(0,0,0,0.3);
    margin-bottom: 20px;
    opacity: 0;
    transform: scale(0.5);
    transition: all 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) 0.8s;
    background: linear-gradient(135deg, #ffffff, #ffe4e9);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 4px 20px rgba(196,69,105,0.6));
  }
  
  .bouquet-wrapper {
    position: relative;
    opacity: 0;
    transform: scale(0.3) translateY(100px);
    transition: all 1.5s cubic-bezier(0.34, 1.56, 0.64, 1) 1.2s;
  }
  
  .bouquet-img {
    width: min(450px, 80vw);
    height: auto;
    filter: drop-shadow(0 20px 40px rgba(0,0,0,0.3));
    animation: gentleFloat 4s ease-in-out infinite;
    animation-delay: 2.5s;
  }
  
  @keyframes gentleFloat {
    0%, 100% { transform: translateY(0) rotate(-1deg); }
    50% { transform: translateY(-15px) rotate(1deg); }
  }
  
  .message-card {
    margin-top: 30px;
    padding: 20px 40px;
    background: rgba(255,255,255,0.25);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 2px solid rgba(255,255,255,0.4);
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(196,69,105,0.2);
    opacity: 0;
    transform: translateY(30px);
    transition: all 1s ease 2s;
    text-align: center;
  }
  
  .message-card p {
    font-family: 'Dancing Script', cursive;
    font-size: 1.5rem;
    color: white;
    text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    margin-bottom: 5px;
  }
  
  .message-card .from {
    font-family: 'Great Vibes', cursive;
    font-size: 2rem;
    color: #fff;
    background: linear-gradient(135deg, #ffffff, #ffe4e9);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  
  .bouquet-scene.visible .for-text,
  .bouquet-scene.visible .name-text,
  .bouquet-scene.visible .bouquet-wrapper,
  .bouquet-scene.visible .message-card {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
  
  /* Replay button */
  .replay-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    padding: 10px 20px;
    background: rgba(255,255,255,0.3);
    backdrop-filter: blur(10px);
    border: 2px solid rgba(255,255,255,0.5);
    border-radius: 30px;
    color: white;
    font-family: 'Dancing Script', cursive;
    font-size: 1rem;
    cursor: pointer;
    z-index: 100;
    transition: all 0.3s;
    opacity: 0;
    pointer-events: none;
  }
  
  .replay-btn.show {
    opacity: 1;
    pointer-events: auto;
  }
  
  .replay-btn:hover {
    background: rgba(255,255,255,0.5);
    transform: scale(1.05);
  }
  
  /* Music note floating */
  @media (max-width: 600px) {
    .name-text { font-size: 3.5rem; }
    .for-text { font-size: 1.8rem; }
    .gift-text { font-size: 2rem; }
    .message-card p { font-size: 1.2rem; }
    .message-card .from { font-size: 1.5rem; }
  }
</style>
</head>
<body>

<!-- Gift Box Scene -->
<div class="container">
  <div class="gift-scene" id="giftScene">
    <div class="gift-box" id="giftBox">
      <div class="box-bow">
        <div class="bow-loop left"></div>
        <div class="bow-loop right"></div>
        <div class="bow-knot"></div>
      </div>
      <div class="box-lid"></div>
      <div class="box-body"></div>
    </div>
    <div class="gift-text">A special gift...</div>
    <div class="tap-hint">✨ tap to open ✨</div>
  </div>
  
  <!-- Bouquet Reveal Scene -->
  <div class="bouquet-scene" id="bouquetScene">
    <div class="for-text">for</div>
    <div class="name-text">Sadia</div>
    <div class="bouquet-wrapper">
      <img class="bouquet-img" src="https://image.qwenlm.ai/public_source/97366c05-013f-447c-abac-8c8bdfe0de72/1422c47ea-2750-4ee5-aa2a-0916fde09ed0.png" alt="Beautiful bouquet for Sadia">
    </div>
    <div class="message-card">
      <p>With all my love & warm wishes</p>
      <div class="from">— Shayan</div>
    </div>
  </div>
</div>

<button class="replay-btn" id="replayBtn">↻ Play Again</button>

<script>
  // Create falling petals
  function createPetal() {
    const petal = document.createElement('div');
    petal.className = 'petal';
    const colors = ['#ff6b9d', '#ffb3c6', '#ff8fab', '#ffc2d1', '#ff4778'];
    const color = colors[Math.floor(Math.random() * colors.length)];
    const size = 15 + Math.random() * 15;
    
    // SVG petal shape
    petal.innerHTML = `<svg width="${size}" height="${size}" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2 C 8 6, 4 8, 4 14 C 4 18, 8 22, 12 22 C 16 22, 20 18, 20 14 C 20 8, 16 6, 12 2 Z" 
        fill="${color}" opacity="0.9"/>
    </svg>`;
    
    petal.style.left = Math.random() * 100 + 'vw';
    petal.style.animation = `fall ${6 + Math.random() * 5}s linear forwards`;
    petal.style.animationDelay = Math.random() * 2 + 's';
    
    document.body.appendChild(petal);
    setTimeout(() => petal.remove(), 12000);
  }
  
  // Create floating hearts
  function createHeart() {
    const heart = document.createElement('div');
    heart.className = 'heart';
    heart.innerHTML = ['♥', '❤', '💕', '💖'][Math.floor(Math.random() * 4)];
    heart.style.left = Math.random() * 100 + 'vw';
    heart.style.bottom = '-30px';
    heart.style.fontSize = (15 + Math.random() * 25) + 'px';
    heart.style.animationDuration = (5 + Math.random() * 5) + 's';
    
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 10000);
  }
  
  // Create sparkles
  function createSparkle() {
    const sparkle = document.createElement('div');
    sparkle.className = 'sparkle';
    sparkle.style.left = Math.random() * 100 + 'vw';
    sparkle.style.top = Math.random() * 100 + 'vh';
    sparkle.style.animationDelay = Math.random() * 2 + 's';
    
    document.body.appendChild(sparkle);
    setTimeout(() => sparkle.remove(), 4000);
  }
  
  // Start ambient effects
  setInterval(createPetal, 400);
  setInterval(createHeart, 1500);
  setInterval(createSparkle, 300);
  
  // Initial batch
  for (let i = 0; i < 8; i++) {
    setTimeout(createPetal, i * 200);
  }
  
  // Open gift box
  const giftBox = document.getElementById('giftBox');
  const giftScene = document.getElementById('giftScene');
  const bouquetScene = document.getElementById('bouquetScene');
  const replayBtn = document.getElementById('replayBtn');
  
  giftBox.addEventListener('click', () => {
    const lid = giftBox.querySelector('.box-lid');
    const bow = giftBox.querySelector('.box-bow');
    
    // Open lid animation
    lid.style.transform = 'translateY(-150px) rotate(-45deg)';
    bow.style.transition = 'all 0.8s ease';
    bow.style.transform = 'translateX(-50%) translateY(-200px) rotate(-45deg)';
    bow.style.opacity = '0';
    
    // Burst of hearts
    for (let i = 0; i < 20; i++) {
      setTimeout(createHeart, i * 80);
    }
    for (let i = 0; i < 15; i++) {
      setTimeout(createPetal, i * 60);
    }
    
    // Switch to bouquet scene
    setTimeout(() => {
      giftScene.classList.add('hidden');
    }, 800);
    
    setTimeout(() => {
      bouquetScene.classList.add('visible');
      replayBtn.classList.add('show');
    }, 1500);
  });
  
  // Replay
  replayBtn.addEventListener('click', () => {
    bouquetScene.classList.remove('visible');
    replayBtn.classList.remove('show');
    
    setTimeout(() => {
      giftScene.classList.remove('hidden');
      const lid = giftBox.querySelector('.box-lid');
      const bow = giftBox.querySelector('.box-bow');
      lid.style.transform = '';
      bow.style.transform = 'translateX(-50%)';
      bow.style.opacity = '1';
    }, 1000);
  });
  
  // Prevent zoom on double tap (mobile)
  document.addEventListener('dblclick', (e) => e.preventDefault());
</script>

</body>
</html>
